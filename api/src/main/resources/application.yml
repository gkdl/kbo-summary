spring:
  application:
    name: kbo-summary-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      # 스키마는 Flyway가 단일 소스로 관리한다 (Hibernate 자동 DDL 비활성화)
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        # ATP 가 UTC 로 저장해도 Hibernate 가 KST 로 변환해서 읽음/씀
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    # TNS alias 는 wallet 의 tnsnames.ora 에 정의됨. 실행 시 -Doracle.net.tns_admin=/path/to/wallet 또는 TNS_ADMIN 환경변수 필요.
    url: ${DB_URL:jdbc:oracle:thin:@p0mpe7dp2i5vywqf_tp}
    username: ${DB_USERNAME:KBO}
    password: ${DB_PASSWORD:}
server:
  port: ${SERVER_PORT:8080}

# 카카오 로그인 / JWT — 실제 값은 서버 환경변수(.env)로 주입한다
kakao:
  # 카카오 access token 검증에는 별도 시크릿이 필요 없으나, 추후 검증 강화를 위해 앱 정보 보관
  app-id: ${KAKAO_APP_ID:}
jwt:
  # 반드시 환경변수로 강력한 시크릿 주입 (최소 32바이트). 기본값은 로컬 개발 전용.
  secret: ${JWT_SECRET:local-dev-only-secret-please-override-with-env-32b+}
  access-token-validity-seconds: ${JWT_ACCESS_TTL:3600}        # 1시간
  refresh-token-validity-seconds: ${JWT_REFRESH_TTL:2592000}   # 30일

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.kbo.summary: INFO
