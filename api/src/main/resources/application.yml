spring:
  application:
    name: kbo-summary-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      # 스키마는 Flyway가 단일 소스로 관리한다 (Hibernate 자동 DDL 비활성화)
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        # ATP 가 UTC 로 저장해도 Hibernate 가 KST 로 변환해서 읽음/씀
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    # TNS alias 는 wallet 의 tnsnames.ora 에 정의됨. 실행 시 -Doracle.net.tns_admin=/path/to/wallet 또는 TNS_ADMIN 환경변수 필요.
    url: ${DB_URL:jdbc:oracle:thin:@p0mpe7dp2i5vywqf_tp}
    username: ${DB_USERNAME:KBO}
    password: ${DB_PASSWORD:}
server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.kbo.summary: INFO
