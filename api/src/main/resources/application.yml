spring:
  application:
    name: kbo-summary-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      # 스키마는 Flyway가 단일 소스로 관리한다 (Hibernate 자동 DDL 비활성화)
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    url: jdbc:oracle:thin:@p0mpe7dp2i5vywqf_tp
    username: SCRIPT
    password: QAZwsx123!@$
server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.kbo.summary: INFO
