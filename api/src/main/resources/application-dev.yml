spring:
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    # 로컬은 .env 또는 셸 변수에서 읽음. 평문 비밀번호 커밋 금지.
    url: ${DB_URL:jdbc:oracle:thin:@p0mpe7dp2i5vywqf_tp}
    username: ${DB_USERNAME:SCRIPT}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.kbo.summary: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
