# 운영(GCP/Railway 등) 전용. DB 자격증명은 application.yml 의 env var placeholder 그대로 사용.
# 이 프로필은 운영 환경에 맞춰 로깅/관찰성/캐시/액추에이터 노출 범위를 조정한다.
spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        # 운영에선 포맷팅 끄고 한 줄로 (로그 크기 절감)
        format_sql: false
  # 운영용 connection pool 튜닝 (HikariCP)
  # e2-micro / 작은 인스턴스 기준. 큰 머신이면 maximum-pool-size 20~30 으로 올려도 됨.
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000

# 운영에선 Swagger UI 비공개 (필요 시 true 로)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# Spring Actuator — health 만 외부 노출, 나머지는 차단
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.kbo.summary: INFO
    org.springframework: WARN
    org.hibernate: WARN
    # 운영에서 SQL 바인딩 노출은 PII 유출 위험 → 끔
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
