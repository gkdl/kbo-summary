name: Deploy Mobile (EAS Build)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        working-directory: mobile
        run: npm install

      - name: EAS CLI 설치
        run: npm install -g eas-cli

      # 빌드만 자동(AAB 생성). Play Store 업로드는 수동(EAS 대시보드에서 AAB 받아 Play Console 업로드).
      # 자동 제출(--auto-submit)은 EAS 에 Google Service Account 키 등록이 선행돼야 하므로 보류.
      - name: EAS Build (AAB)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile store --non-interactive
