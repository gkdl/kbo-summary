name: Deploy Mobile (EAS Build)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 셋업
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        working-directory: mobile
        run: npm install

      - name: EAS CLI 설치
        run: npm install -g eas-cli

      # main 에 mobile/** 변경이 머지될 때만 실행되는 트리거이므로(위 on.push),
      # 빌드 직후 Play Store 에 자동 제출(--auto-submit, eas.json 의 submit.store 프로필 사용).
      # EAS 에 Google Service Account 키가 등록돼 있어야 동작한다.
      - name: EAS Build (AAB) & Submit to Play Store
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile store --non-interactive --auto-submit
