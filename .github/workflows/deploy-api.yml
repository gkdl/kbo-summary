name: Deploy API to GCP VM

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'crawler/**'
      - 'core/**'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/deploy-api.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 셋업
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle 캐시 셋업
        uses: gradle/actions/setup-gradle@v4

      - name: JAR 빌드
        run: |
          chmod +x gradlew
          ./gradlew :api:bootJar --no-daemon

      - name: SSH 키 등록
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 104.198.2.246 >> ~/.ssh/known_hosts

      - name: JAR + Dockerfile VM 에 전송
        run: |
          scp -i ~/.ssh/id_ed25519 \
            api/build/libs/*.jar \
            lim@104.198.2.246:/home/lim/kbo-summary/app.jar
          scp -i ~/.ssh/id_ed25519 \
            Dockerfile docker-entrypoint.sh \
            lim@104.198.2.246:/home/lim/kbo-summary/

      - name: VM 에서 Docker 재빌드 및 재시작
        run: |
          ssh -i ~/.ssh/id_ed25519 lim@104.198.2.246 "
            cd /home/lim/kbo-summary
            docker build -t kbo-api .
            docker stop kbo-api 2>/dev/null || true
            docker rm kbo-api 2>/dev/null || true
            docker run -d \
              --name kbo-api \
              --env-file .env \
              -e JAVA_TOOL_OPTIONS='-Xmx500m -XX:MaxRAMPercentage=50' \
              -p 8080:8080 \
              --restart unless-stopped \
              --memory=700m \
              kbo-api
            docker ps | grep kbo-api
          "

      - name: 헬스 체크
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 104.198.2.246 >> ~/.ssh/known_hosts

          for i in $(seq 1 12); do
            sleep 15
            if curl -fsS http://104.198.2.246:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "✓ Health check OK (시도 $i)"
              exit 0
            fi
            echo "헬스 체크 대기 중... ($i/12)"
          done

          echo "=== 헬스 체크 실패 — 컨테이너 로그 ==="
          ssh -i ~/.ssh/id_ed25519 lim@104.198.2.246 "docker logs --tail 100 kbo-api"
          exit 1
