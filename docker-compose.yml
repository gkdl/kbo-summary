# 로컬 개발용 Docker Compose: Oracle XE + Spring API
# 사용:  docker compose --env-file .env up --build

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: kbo-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: ${DB_PASSWORD:-changeme}
      APP_USER: ${DB_USERNAME:-kbo}
      APP_USER_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbo-api
    restart: unless-stopped
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # application-*.yml 이 참조하는 변수 이름으로 매핑
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      ORACLE_SERVICE: XEPDB1
      ORACLE_USER: ${DB_USERNAME:-kbo}
      ORACLE_PASSWORD: ${DB_PASSWORD:-changeme}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      KBO_CRAWLER_BASE_URL: ${KBO_CRAWLER_BASE_URL:-https://www.koreabaseball.com}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  oracle_data:
