# Railway 배포 설정 — 루트 Dockerfile 로 :api 부트 jar 빌드/실행
# 환경변수(DB_USERNAME/DB_PASSWORD/ANTHROPIC_API_KEY 등)는 Railway 대시보드에서 주입

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
